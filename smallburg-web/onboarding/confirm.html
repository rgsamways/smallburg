<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your account — Smallburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e0b; --surface: #1a1917; --border: #2a2926;
      --text: #e8e4dc; --muted: #888880; --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.12); --error: #e07070;
      --grid-minor: rgba(255,255,255,0.025); --grid-major: rgba(255,255,255,0.05);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(var(--grid-minor) 1px, transparent 1px), linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px), linear-gradient(var(--grid-major) 1px, transparent 1px), linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
      background-size: 48px 48px, 48px 48px, 240px 240px, 240px 240px;
    }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); background: rgba(15,14,11,0.85); backdrop-filter: blur(8px); }
    .wordmark { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 0.05em; text-decoration: none; }
    .nav-step { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
    main { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 120px 24px 64px; }
    .progress { width: 100%; max-width: 480px; display: flex; gap: 6px; margin-bottom: 48px; }
    .progress-step { flex: 1; height: 2px; background: var(--border); border-radius: 2px; }
    .progress-step.done { background: rgba(200,169,110,0.4); }
    .progress-step.active { background: var(--accent); }
    .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 40px; }
    .card-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; font-weight: 400; margin-bottom: 32px; line-height: 1.2; }
    .summary { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 18px 20px; margin-bottom: 32px; }
    .summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; font-size: 13px; }
    .summary-row:not(:last-child) { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 3px; }
    .summary-key { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; }
    .summary-val { color: var(--text); text-align: right; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input[type="password"], input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px 42px 12px 14px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; outline: none; }
    input:focus { border-color: var(--accent); }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 0; }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .field-error { font-size: 11px; color: var(--error); margin-top: 6px; display: none; }
    .field-error.visible { display: block; }
    .error-banner { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); border-radius: 4px; padding: 12px 16px; font-size: 13px; color: var(--error); margin-bottom: 20px; display: none; }
    .error-banner.visible { display: block; }
    .btn-primary { width: 100%; margin-top: 8px; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; letter-spacing: 0.02em; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--text); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(15,14,11,0.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<nav>
  <a href="https://smallburg.ca" class="wordmark">smallburg</a>
  <span class="nav-step">Step 2 of 3</span>
</nav>
<main>
  <div class="progress">
    <div class="progress-step done"></div>
    <div class="progress-step active"></div>
    <div class="progress-step"></div>
  </div>

  <div class="card">
    <div class="card-label">Confirm your details</div>
    <h1>Set your password.</h1>

    <div class="summary" id="summary">
      <div class="summary-row"><span class="summary-key">Email</span><span class="summary-val" id="s-email">—</span></div>
      <div class="summary-row"><span class="summary-key">Name</span><span class="summary-val" id="s-name">—</span></div>
      <div class="summary-row"><span class="summary-key">Role</span><span class="summary-val" id="s-role">—</span></div>
      <div class="summary-row" id="s-cert-row" style="display:none"><span class="summary-key">Certifications</span><span class="summary-val" id="s-certs">—</span></div>
      <div class="summary-row"><span class="summary-key">Municipalities</span><span class="summary-val" id="s-munis">—</span></div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password">
        <button class="toggle-pw" type="button" id="toggle-pw1" aria-label="Show password">👁</button>
      </div>
      <div class="field-hint">Minimum 8 characters</div>
    </div>

    <div class="field">
      <label for="password2">Confirm password</label>
      <div class="input-wrap">
        <input type="password" id="password2" placeholder="Repeat password" autocomplete="new-password">
        <button class="toggle-pw" type="button" id="toggle-pw2" aria-label="Show password">👁</button>
      </div>
      <div class="field-error" id="pw-mismatch">Passwords don't match.</div>
    </div>

    <button class="btn-primary" id="btn-submit" disabled>Create my account →</button>
    <a href="javascript:history.back()" class="back-link">← Back</a>
  </div>
</main>

<script>
  const ROLE_LABELS = { inspector: 'Inspector', municipal_staff: 'Municipal staff', community_member: 'Community member' };

  let formData = null;

  function init() {
    const raw = sessionStorage.getItem('sb_onboarding');
    if (!raw) { location.href = 'index.html'; return; }
    formData = JSON.parse(raw);

    document.getElementById('s-email').textContent = formData.email || '—';
    document.getElementById('s-name').textContent = formData.name || '—';
    document.getElementById('s-role').textContent = ROLE_LABELS[formData.role] || formData.role;
    document.getElementById('s-munis').textContent = (formData.municipalities || []).join(', ') || '—';

    if (formData.certifications?.length) {
      const names = { ember: 'Ember', anchor: 'Anchor', hatch: 'Hatch' };
      document.getElementById('s-certs').textContent = formData.certifications.map(c => names[c] || c).join(', ');
      document.getElementById('s-cert-row').style.display = '';
    }

    // Restore email from verify step if stored
    if (!formData.email && formData.token) {
      fetch(`/api/auth/verify?token=${encodeURIComponent(formData.token)}`)
        .then(r => r.json())
        .then(d => { document.getElementById('s-email').textContent = d.email || '—'; });
    }
  }

  // Toggle password visibility
  ['pw1', 'pw2'].forEach((id, i) => {
    const btn = document.getElementById(`toggle-${id}`);
    const inp = document.getElementById(i === 0 ? 'password' : 'password2');
    btn.addEventListener('click', () => {
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    });
  });

  function validate() {
    const pw = document.getElementById('password').value;
    const pw2 = document.getElementById('password2').value;
    const mismatch = document.getElementById('pw-mismatch');
    const ok = pw.length >= 8 && pw === pw2;
    mismatch.classList.toggle('visible', pw2.length > 0 && pw !== pw2);
    document.getElementById('btn-submit').disabled = !ok;
  }

  document.getElementById('password').addEventListener('input', validate);
  document.getElementById('password2').addEventListener('input', validate);

  document.getElementById('btn-submit').addEventListener('click', async () => {
    const btn = document.getElementById('btn-submit');
    const banner = document.getElementById('error-banner');
    banner.classList.remove('visible');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account…';

    const params = new URLSearchParams(location.search);
    const token = params.get('token') || formData.token;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          token,
          name: formData.name,
          role: formData.role,
          certifications: formData.certifications || [],
          workspaces: formData.workspaces || [],
          password,
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        banner.textContent = data.detail || 'Something went wrong. Please try again.';
        banner.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Create my account →';
        return;
      }

      sessionStorage.removeItem('sb_onboarding');
      location.href = 'welcome.html';
    } catch (err) {
      banner.textContent = 'Network error. Please check your connection and try again.';
      banner.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Create my account →';
    }
  });

  init();
</script>
</body>
</html>
