<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up your account — Smallburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0b;
      --surface: #1a1917;
      --border: #2a2926;
      --text: #e8e4dc;
      --muted: #888880;
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --error: #e07070;
      --grid-minor: rgba(255,255,255,0.025);
      --grid-major: rgba(255,255,255,0.05);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(var(--grid-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px),
        linear-gradient(var(--grid-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
      background-size: 48px 48px, 48px 48px, 240px 240px, 240px 240px;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,14,11,0.85);
      backdrop-filter: blur(8px);
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-step {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    main {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 120px 24px 64px;
    }

    /* Progress bar */
    .progress {
      width: 100%; max-width: 480px;
      display: flex; gap: 6px;
      margin-bottom: 48px;
    }

    .progress-step {
      flex: 1; height: 2px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s;
    }

    .progress-step.active { background: var(--accent); }
    .progress-step.done { background: rgba(200,169,110,0.4); }

    .card {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 32px;
      line-height: 1.2;
    }

    .email-display {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .role-option {
      position: relative;
    }

    .role-option input[type="radio"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }

    .role-option label {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-transform: none;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: center;
      line-height: 1.3;
    }

    .role-option input[type="radio"]:checked + label {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .role-icon { font-size: 18px; margin-bottom: 6px; }

    .cert-grid {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 8px;
    }

    .cert-option { position: relative; }

    .cert-option input[type="checkbox"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }

    .cert-option label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .cert-option input[type="checkbox"]:checked + label {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Municipality tag picker */
    .muni-input-wrap { position: relative; }

    .muni-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 40px;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: text;
      transition: border-color 0.2s;
    }

    .muni-tags.focused { border-color: var(--accent); }

    .muni-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,169,110,0.3);
      color: var(--accent);
      font-size: 12px;
      padding: 3px 10px 3px 12px;
      border-radius: 20px;
    }

    .muni-tag button {
      background: none; border: none; color: var(--accent);
      cursor: pointer; padding: 0; font-size: 14px; line-height: 1;
      opacity: 0.6;
    }

    .muni-tag button:hover { opacity: 1; }

    .muni-search {
      border: none; outline: none; background: transparent;
      color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
      min-width: 120px; flex: 1;
    }

    .muni-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-height: 200px; overflow-y: auto;
      z-index: 20;
      display: none;
    }

    .muni-dropdown.open { display: block; }

    .muni-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }

    .muni-item:hover, .muni-item.highlighted { background: var(--accent-dim); color: var(--accent); }
    .muni-item.selected { opacity: 0.4; cursor: default; }

    .cert-section { display: none; }
    .cert-section.visible { display: block; }

    .btn-primary {
      width: 100%;
      margin-top: 32px;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-screen {
      text-align: center;
      padding: 48px 0;
    }

    .error-screen .icon { font-size: 32px; margin-bottom: 16px; }
    .error-screen h2 { font-size: 18px; font-weight: 400; margin-bottom: 8px; }
    .error-screen p { font-size: 14px; color: var(--muted); }
    .error-screen a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a href="https://smallburg.ca" class="wordmark">smallburg</a>
  <span class="nav-step">Step 1 of 3</span>
</nav>

<main>
  <div class="progress">
    <div class="progress-step active"></div>
    <div class="progress-step"></div>
    <div class="progress-step"></div>
  </div>

  <div class="card" id="form-card">
    <div class="card-label">Account setup</div>
    <h1>Tell us a little more.</h1>

    <div class="email-display" id="email-display">Verifying…</div>

    <div class="field">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" placeholder="Jamie McAllister" autocomplete="name" required>
    </div>

    <div class="field">
      <label>Your role</label>
      <div class="role-grid">
        <div class="role-option">
          <input type="radio" name="role" id="role-inspector" value="inspector">
          <label for="role-inspector">
            <span class="role-icon">🔍</span>Inspector
          </label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="role-staff" value="municipal_staff">
          <label for="role-staff">
            <span class="role-icon">🏛</span>Municipal staff
          </label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="role-community" value="community_member">
          <label for="role-community">
            <span class="role-icon">🌱</span>Community member
          </label>
        </div>
      </div>
    </div>

    <div class="field cert-section" id="cert-section">
      <label>Certifications</label>
      <div class="cert-grid">
        <div class="cert-option">
          <input type="checkbox" id="cert-ember" value="ember">
          <label for="cert-ember">🔥 Ember</label>
        </div>
        <div class="cert-option">
          <input type="checkbox" id="cert-anchor" value="anchor">
          <label for="cert-anchor">⚓ Anchor</label>
        </div>
        <div class="cert-option">
          <input type="checkbox" id="cert-hatch" value="hatch">
          <label for="cert-hatch">🚪 Hatch</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Municipalities</label>
      <div class="muni-input-wrap">
        <div class="muni-tags" id="muni-tags">
          <input class="muni-search" id="muni-search" type="text" placeholder="Search municipalities…" autocomplete="off">
        </div>
        <div class="muni-dropdown" id="muni-dropdown"></div>
      </div>
    </div>

    <button class="btn-primary" id="btn-next" disabled>Continue →</button>
  </div>

  <div class="card" id="error-card" style="display:none">
    <div class="error-screen">
      <div class="icon">⏱</div>
      <h2>This link has expired.</h2>
      <p>Magic links are single-use and expire after 24 hours.<br>
         <a href="https://smallburg.ca">Request access again →</a></p>
    </div>
  </div>
</main>

<script>
  const MUNICIPALITIES = [
    "Town of Bancroft","Municipality of Hastings Highlands","Township of Highlands East",
    "Dysart et al","Municipality of Tweed","Township of Stirling-Rawdon",
    "Municipality of Centre Hastings","Township of Tyendinaga","Township of Faraday",
    "Township of Carlow/Mayo","Township of Wollaston","Township of Limerick",
    "Town of Parry Sound","Town of Arnprior","Township of Whitewater Region",
    "Municipality of North Hastings","Municipality of Marmora and Lake",
    "Township of Tudor and Cashel","Township of Wollaston"
  ].sort();

  let verifiedData = null;
  let selectedMunis = [];

  // -- Token verification --
  async function init() {
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    if (!token) return showError();

    try {
      const res = await fetch(`/api/auth/verify?token=${encodeURIComponent(token)}`);
      if (!res.ok) return showError();
      const data = await res.json();
      verifiedData = data;
      document.getElementById('email-display').textContent = data.email;
      // Pre-select primary municipality from claim
      const primary = MUNICIPALITIES.find(m => m.toLowerCase().includes(data.municipality?.toLowerCase?.() ?? ''));
      if (primary && !selectedMunis.includes(primary)) addMuni(primary);
    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('error-card').style.display = 'block';
    document.querySelector('.nav-step').textContent = '';
  }

  // -- Role selector --
  document.querySelectorAll('input[name="role"]').forEach(r => {
    r.addEventListener('change', () => {
      const certSection = document.getElementById('cert-section');
      certSection.classList.toggle('visible', r.value === 'inspector');
      validateForm();
    });
  });

  // -- Municipality picker --
  const tagsEl = document.getElementById('muni-tags');
  const searchEl = document.getElementById('muni-search');
  const dropdownEl = document.getElementById('muni-dropdown');
  let highlightIdx = -1;

  tagsEl.addEventListener('click', () => searchEl.focus());
  searchEl.addEventListener('focus', () => tagsEl.classList.add('focused'));
  searchEl.addEventListener('blur', () => { setTimeout(() => { dropdownEl.classList.remove('open'); tagsEl.classList.remove('focused'); }, 150); });

  searchEl.addEventListener('input', renderDropdown);

  searchEl.addEventListener('keydown', (e) => {
    const items = dropdownEl.querySelectorAll('.muni-item:not(.selected)');
    if (e.key === 'ArrowDown') { highlightIdx = Math.min(highlightIdx + 1, items.length - 1); updateHighlight(items); e.preventDefault(); }
    if (e.key === 'ArrowUp')   { highlightIdx = Math.max(highlightIdx - 1, 0); updateHighlight(items); e.preventDefault(); }
    if (e.key === 'Enter' && highlightIdx >= 0) { addMuni(items[highlightIdx].dataset.value); searchEl.value = ''; highlightIdx = -1; e.preventDefault(); }
    if (e.key === 'Backspace' && !searchEl.value && selectedMunis.length) { removeMuni(selectedMunis[selectedMunis.length - 1]); }
  });

  function renderDropdown() {
    const q = searchEl.value.toLowerCase();
    const matches = q ? MUNICIPALITIES.filter(m => m.toLowerCase().includes(q)) : MUNICIPALITIES;
    dropdownEl.innerHTML = '';
    highlightIdx = -1;
    if (!matches.length) { dropdownEl.classList.remove('open'); return; }
    matches.forEach(m => {
      const div = document.createElement('div');
      div.className = 'muni-item' + (selectedMunis.includes(m) ? ' selected' : '');
      div.textContent = m;
      div.dataset.value = m;
      if (!selectedMunis.includes(m)) div.addEventListener('mousedown', () => { addMuni(m); searchEl.value = ''; });
      dropdownEl.appendChild(div);
    });
    dropdownEl.classList.add('open');
  }

  function updateHighlight(items) {
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
  }

  function addMuni(name) {
    if (selectedMunis.includes(name)) return;
    selectedMunis.push(name);
    renderTags();
    validateForm();
    dropdownEl.classList.remove('open');
  }

  function removeMuni(name) {
    selectedMunis = selectedMunis.filter(m => m !== name);
    renderTags();
    validateForm();
  }

  function renderTags() {
    const existing = tagsEl.querySelectorAll('.muni-tag');
    existing.forEach(t => t.remove());
    selectedMunis.forEach(m => {
      const tag = document.createElement('div');
      tag.className = 'muni-tag';
      tag.innerHTML = `<span>${m}</span><button type="button" aria-label="Remove">×</button>`;
      tag.querySelector('button').addEventListener('click', () => removeMuni(m));
      tagsEl.insertBefore(tag, searchEl);
    });
  }

  // -- Validation --
  function validateForm() {
    const name = document.getElementById('name').value.trim();
    const role = document.querySelector('input[name="role"]:checked')?.value;
    const ok = name.length > 0 && !!role && selectedMunis.length > 0;
    document.getElementById('btn-next').disabled = !ok;
  }

  document.getElementById('name').addEventListener('input', validateForm);

  // -- Submit --
  document.getElementById('btn-next').addEventListener('click', () => {
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const role = document.querySelector('input[name="role"]:checked').value;
    const certs = [...document.querySelectorAll('.cert-option input:checked')].map(c => c.value);
    const wsIds = verifiedData?.workspace_id ? [verifiedData.workspace_id] : [];

    // Add any extra workspaces user might belong to (initially just the one from claim)
    const formData = {
      token,
      name: document.getElementById('name').value.trim(),
      role,
      certifications: certs,
      workspaces: wsIds,
      municipalities: selectedMunis,
      claim_id: verifiedData?.claim_id,
    };

    sessionStorage.setItem('sb_onboarding', JSON.stringify(formData));
    location.href = `confirm.html?token=${encodeURIComponent(token)}`;
  });

  init();
</script>
</body>
</html>
